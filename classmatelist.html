<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 10 Classmates System</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f5fb;
            color: #2d3748;
        }
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            z-index: 1000;
        }

        .nav-title {
            font-size: 18px;
            font-weight: bold;
            color: #1e3a8a;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            text-decoration: none;
            font-weight: 600;
            color: #334155;
            position: relative;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: #2563eb;
        }

        .nav-links a::after {
            content: "";
            position: absolute;
            width: 0%;
            height: 2px;
            bottom: -4px;
            left: 0;
            background-color: #2563eb;
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }
        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
            padding: 28px;
            margin-bottom: 24px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            margin: 0;
            font-size: 2rem;
            color: #1e293b;
        }
        .header p {
            margin: 8px 0 0;
            color: #64748b;
        }
        .input-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
        }
        .field {
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 14px 16px;
            font-size: 1rem;
            width: 100%;
            box-sizing: border-box;
        }
        .button-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 18px;
        }
        .button {
            border: none;
            border-radius: 10px;
            padding: 14px 20px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }
        .button:hover {
            transform: translateY(-1px);
        }
        .button-primary {
            background: #2563eb;
            color: white;
        }
        .button-secondary {
            background: #166534;
            color: white;
        }
        .list-card h2 {
            margin: 0 0 14px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .classmate-list {
            margin: 0;
            padding: 0;
            list-style: none;
        }
        .classmate-item {
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
            color: #334155;
        }
        .classmate-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>

   <nav class="navbar">
    <div class="nav-title">Grade 10 Ruby</div>
    <ul class="nav-links">
        <li><a href="classmatelist.html">Classmate</a></li>
        <li><a href="attendance.html">Attendance Tracker</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><br></li>
    </ul>
    </nav>

    <div class="container">
        <div class="card header">
            <h1>Grade 10 Classmates System</h1>
            <p>Add and view your classmates easily</p>
        </div>

        <div class="card">
            <div class="input-grid">
                <input id="nameInput" class="field" type="text" placeholder="Name" />
                <input id="sectionInput" class="field" type="text" placeholder="Section" />
                <input id="subjectInput" class="field" type="text" placeholder="Favorite Subject" />
            </div>
            <div class="button-row">
                <button id="addBtn" class="button button-primary" type="button">Add Classmate</button>
                <button id="showBtn" class="button button-secondary" type="button" onclick="classmates">Show List</button>
            </div>
        </div>

        <div class="card list-card">
            <h2>Classmate List</h2>
            <ul id="classmateList" class="classmate-list"></ul>
        </div>
    </div>

    <script>
        const classmates = [
            {"name": "Nathan", "section": "Ruby", "subject": "Science"},
            {"name": "Anthea", "section": "Ruby", "subject": "Math"},
            {"name": "Maiah", "section": "Ruby", "subject": "Music and Social Studies"},
            {"name": "Anexela", "section": "Ruby", "subject": "Music and Social Studies"},
            {"name": "Gabriella", "section": "Ruby", "subject": "Art"},
            {"name": "Julianne", "section": "Ruby", "subject": "Social Studies"},
            {"name": "Caiomey", "section": "Ruby", "subject": "Snacktime"},
            {"name": "Athena", "section": "Ruby", "subject": "TLE"},
            {"name": "Nikolo", "section": "Ruby", "subject": "PE"},
            {"name": "Chelsea", "section": "Ruby", "subject": "Social Studies"},
            {"name": "Jercey", "section": "Ruby", "subject": "English"},
            {"name": "Sittie", "section": "Ruby", "subject": "Math"},
            {"name": "Jarett", "section": "Ruby", "subject": "Math"},
            {"name": "Jakob E.", "section": "Ruby", "subject": "TLE"},
            {"name": "Chloe", "section": "Ruby", "subject": "Social Studies"},
            {"name": "Urielle", "section": "Ruby", "subject": "TLE"},
            {"name": "Aaron", "section": "Ruby", "subject": "PE"},
            {"name": "Gelo", "section": "Ruby", "subject": "English"},
            {"name": "Ezra", "section": "Ruby", "subject": "Social Studies"},
            {"name": "Jakob L.", "section": "Ruby", "subject": "Social Studies and PE"},
            {"name": "Trisha", "section": "Ruby", "subject": "English and Science"},
            {"name": "Kaila", "section": "Ruby", "subject": "Music"},
            {"name": "Xander", "section": "Ruby", "subject": "Math"},
            {"name": "Sam", "section": "Ruby", "subject": "Social Studies"},
            {"name": "Pio", "section": "Ruby", "subject": "PE"},
            {"name": "Katelyn", "section": "Ruby", "subject": "Social Studies"},
            {"name": "Andrei", "section": "Ruby", "subject": "Dismissal"},
            {"name": "Hans", "section": "Ruby", "subject": "PE and Social Studies"}
        ];

        const nameInput = document.getElementById('nameInput');
        const sectionInput = document.getElementById('sectionInput');
        const subjectInput = document.getElementById('subjectInput');
        const addBtn = document.getElementById('addBtn');
        const showBtn = document.getElementById('showBtn');
        const classmateList = document.getElementById('classmateList');

        function renderList() {
            classmateList.innerHTML = '';
            classmates.forEach(({ name, section, subject }) => {
                const item = document.createElement('li');
                item.className = 'classmate-item';
                item.textContent = `Hi! I am ${name} from ${section}. My favorite subject is ${subject}.`;
                classmateList.appendChild(item);
            });
        }

        addBtn.addEventListener('click', () => {
            const name = nameInput.value.trim();
            const section = sectionInput.value.trim();
            const subject = subjectInput.value.trim();

            if (!name || !section || !subject) {
                alert('Please enter name, section, and favorite subject.');
                return;
            }

            classmates.push({ name, section, subject });
            nameInput.value = '';
            sectionInput.value = '';
            subjectInput.value = '';
            renderList();
        });

        showBtn.addEventListener('click', renderList);
        renderList();
    </script>
</body>
</html>
